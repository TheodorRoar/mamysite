<body>

<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;

const GEOS=[
{id:"br",name:"Brazil",numId:"076",lat:-14.24,lng:-51.93,products:["Casino","Live Casino"],region:"Latin America",pop:"210M+",color:"#a78bfa"},
{id:"mx",name:"Mexico",numId:"484",lat:23.63,lng:-102.55,products:["Casino","Live Casino"],region:"Latin America",pop:"130M+",color:"#818cf8"},
{id:"in",name:"India",numId:"356",lat:20.59,lng:78.96,products:["Casino","Live Casino"],region:"South Asia",pop:"1.4B+",color:"#c084fc"},

const TARGET_IDS=new Set(GEOS.map(g=>g.numId));

function InteractiveMap({activeGeo,setActiveGeo}){
const svgRef=useRef(null);
const[worldData,setWorldData]=useState(null);
const[hoverCoords,setHoverCoords]=useState(null);
const[hoverCountry,setHoverCountry]=useState(null);
const[zoomLevel,setZoomLevel]=useState(1);
const zoomB=useRef(null);
const projR=useRef(null);
const W=960,H=540;

useEffect(()=>{
fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
.then(r=>r.json()).then(topo=>{
const countries=topojson.feature(topo,topo.objects.countries);
const borders=topojson.mesh(topo,topo.objects.countries,(a,b)=>a!==b);
setWorldData({countries,borders});
}).catch(e=>console.error(e));

useEffect(()=>{
if(!svgRef.current)return;
const svg=d3.select(svgRef.current);
const proj=d3.geoNaturalEarth1().scale(165).translate([W/2,H/2+10]);
projR.current=proj;
const zoom=d3.zoom().scaleExtent([1,10]).translateExtent([[-300,-200],[W+300,H+200]])
.on("zoom",ev=>{svg.select("#mg").attr("transform",ev.transform);setZoomLevel(ev.transform.k);});
zoomB.current=zoom;
svg.call(zoom);
svg.on("mousemove",ev=>{
const[mx,my]=d3.pointer(ev);const t=d3.zoomTransform(svgRef.current);
const c=proj.invert(t.invert([mx,my]));
if(c&&!isNaN(c[0])&&!isNaN(c[1]))setHoverCoords({lat:c[1].toFixed(2),lng:c[0].toFixed(2),x:mx,y:my});
});
svg.on("mouseleave",()=>{setHoverCoords(null);setHoverCountry(null);});
return()=>{svg.on(".zoom",null);svg.on("mousemove",null);svg.on("mouseleave",null);};
},[]);

const flyTo=useCallback(geo=>{
if(!svgRef.current||!projR.current||!zoomB.current)return;
const svg=d3.select(svgRef.current);
const[px,py]=projR.current([geo.lng,geo.lat]);const s=4;
svg.transition().duration(1200).ease(d3.easeCubicInOut)
.call(zoomB.current.transform,d3.zoomIdentity.translate(W/2-px*s,H/2-py*s).scale(s));
setActiveGeo(geo);
},[setActiveGeo]);

const resetZoom=useCallback(()=>{
if(!svgRef.current||!zoomB.current)return;
d3.select(svgRef.current).transition().duration(800).ease(d3.easeCubicInOut)
.call(zoomB.current.transform,d3.zoomIdentity);
setActiveGeo(null);
},[setActiveGeo]);

const proj=d3.geoNaturalEarth1().scale(165).translate([W/2,H/2+10]);
const pathG=d3.geoPath(proj);
const hqP=proj([HQ.lng,HQ.lat]);

return(

<defs>
<radialGradient id="hqG" cx="50%" cy="50%" r="50%"><stop offset="0%" stopColor="#a78bfa" stopOpacity="0.5"/><stop offset="100%" stopColor="#a78bfa" stopOpacity="0"/></radialGradient>
<filter id="mg2" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="cg" x="-2%" y="-2%" width="104%" height="104%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stopColor="#7c3aed" stopOpacity="0.7"/><stop offset="50%" stopColor="#a78bfa" stopOpacity="0.15"/><stop offset="100%" stopColor="#7c3aed" stopOpacity="0.7"/></linearGradient>
{GEOS.map(g=><radialGradient key={`r-${g.id}`} id={`rg-${g.id}`} cx="50%" cy="50%" r="50%"><stop offset="0%" stopColor={g.color} stopOpacity="0.4"/><stop offset="100%" stopColor={g.color} stopOpacity="0"/></radialGradient>)}
</defs>
<g id="mg">
<path d={pathG({type:"Sphere"})} fill="#0d0b19" stroke="rgba(167,139,250,0.06)" strokeWidth="0.5"/>
<path d={pathG(d3.geoGraticule10())} fill="none" stroke="rgba(167,139,250,0.04)" strokeWidth="0.3"/>
{worldData&&worldData.countries.features.map((f,i)=>{
const cId=f.id;const isT=TARGET_IDS.has(cId);const gD=TARGET_MAP[cId];
const isA=activeGeo&&gD&&activeGeo.id===gD.id;const isH=hoverCountry===cId;
return <path key={i} d={pathG(f)}
fill={isA?"rgba(124,58,237,0.35)":isT?"rgba(124,58,237,0.18)":isH?"rgba(255,255,255,0.06)":"rgba(255,255,255,0.03)"}
stroke={isA?"rgba(167,139,250,0.6)":isT?"rgba(167,139,250,0.3)":"rgba(255,255,255,0.08)"}
strokeWidth={isT?"0.8":"0.3"} filter={isA?"url(#cg)":undefined}
style={{cursor:isT?"pointer":"default",transition:"fill 0.4s,stroke 0.4s"}}
onMouseEnter={()=>setHoverCountry(cId)} onMouseLeave={()=>setHoverCountry(null)}
onClick={()=>{if(isT&&gD)flyTo(gD);}}/>;
})}
{worldData&&<path d={pathG(worldData.borders)} fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth="0.3" strokeLinejoin="round"/>}
{hqP&&GEOS.map(geo=>{
const tp=proj([geo.lng,geo.lat]);if(!tp)return null;
const[x1,y1]=hqP;const[x2,y2]=tp;const mx=(x1+x2)/2;const my=Math.min(y1,y2)-Math.abs(x2-x1)*0.18;
const pD=`M${x1},${y1} Q${mx},${my} ${x2},${y2}`;const isA=activeGeo?.id===geo.id;
return <g key={`a-${geo.id}`}>
<path d={pD} fill="none" stroke="url(#ag)" strokeWidth={isA?"1.5":"0.8"} strokeDasharray="5 5" opacity={isA?0.9:0.2} style={{transition:"opacity 0.5s"}}/>
<circle r="2.5" fill={geo.color} opacity={isA?1:0.4}><animateMotion dur={`${3+Math.random()*2}s`} repeatCount="indefinite" path={pD}/></circle>
{isA&&<circle r="1.5" fill="#fff" opacity="0.7"><animateMotion dur={`${4+Math.random()*2}s`} repeatCount="indefinite" path={pD}/></circle>}
</g>;
})}
{hqP&&<g><circle cx={hqP[0]} cy={hqP[1]} r="24" fill="url(#hqG)"/><circle cx={hqP[0]} cy={hqP[1]} r="5" fill="#7c3aed" stroke="#c4b5fd" strokeWidth="1.5"/>
<text x={hqP[0]} y={hqP[1]-11} textAnchor="middle" fill="#a78bfa" fontSize="8" fontWeight="700" fontFamily="'DM Sans',sans-serif" style={{textShadow:"0 0 8px rgba(124,58,237,0.6)"}}>CURAÇAO HQ</text></g>}
{GEOS.map((geo,i)=>{
const p=proj([geo.lng,geo.lat]);if(!p)return null;const[cx,cy]=p;const isA=activeGeo?.id===geo.id;
return <g key={`m-${geo.id}`} style={{cursor:"pointer"}} onClick={()=>flyTo(geo)}>
<circle cx={cx} cy={cy} r="45" fill={`url(#rg-${geo.id})`} opacity={isA?1:0.4} style={{transition:"opacity 0.5s"}}/>
<circle cx={cx} cy={cy} r={isA?8:6} fill={geo.color} opacity="0.85" filter="url(#mg2)"><animate attributeName="r" values={isA?"8;11;8":"6;8;6"} dur="3s" begin={`${i*0.4}s`} repeatCount="indefinite"/></circle>
<circle cx={cx} cy={cy} r="3.5" fill="#fff" opacity="0.9"/>
<circle cx={cx} cy={cy} r="6" fill="none" stroke={geo.color} strokeWidth="1.2" opacity="0"><animate attributeName="r" values="6;30" dur="2.5s" begin={`${i*0.5}s`} repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0" dur="2.5s" begin={`${i*0.5}s`} repeatCount="indefinite"/></circle>
<g><rect x={cx+14} y={cy-14} width={geo.name.length*7.5+20} height="26" rx="6" fill="rgba(10,8,18,0.92)" stroke={isA?geo.color:"rgba(167,139,250,0.2)"} strokeWidth="0.8"/>
<text x={cx+24} y={cy+2} fill={isA?"#e9d5ff":"#c4b5fd"} fontSize="10" fontWeight="600" fontFamily="'DM Sans',sans-serif">{geo.name}</text></g>
</g>;
})}
</g>
{hoverCoords&&<g style={{pointerEvents:"none"}}><rect x={hoverCoords.x+16} y={hoverCoords.y-10} width="150" height="22" rx="5" fill="rgba(10,8,18,0.9)" stroke="rgba(167,139,250,0.15)" strokeWidth="0.5"/>
<text x={hoverCoords.x+24} y={hoverCoords.y+5} fill="#7c3aed" fontSize="10" fontFamily="'JetBrains Mono',monospace" fontWeight="500">
{Math.abs(parseFloat(hoverCoords.lat)).toFixed(2)}°{parseFloat(hoverCoords.lat)>=0?"N":"S"} {Math.abs(parseFloat(hoverCoords.lng)).toFixed(2)}°{parseFloat(hoverCoords.lng)>=0?"E":"W"}</text></g>}
<g style={{pointerEvents:"none"}}><rect x={W-62} y={H-30} width="50" height="20" rx="4" fill="rgba(10,8,18,0.7)" stroke="rgba(167,139,250,0.1)" strokeWidth="0.5"/>
<text x={W-37} y={H-16} textAnchor="middle" fill="rgba(167,139,250,0.4)" fontSize="10" fontFamily="'JetBrains Mono',monospace">{zoomLevel.toFixed(1)}x</text></g>
{!worldData&&<text x={W/2} y={H/2} textAnchor="middle" fill="#6b7280" fontSize="14" fontFamily="'DM Sans',sans-serif">Loading world map...</text>}
</svg>
<div style={{display:"flex",gap:8,justifyContent:"center",marginTop:18,flexWrap:"wrap"}}>
<button onClick={resetZoom} style={{padding:"7px 16px",borderRadius:100,cursor:"pointer",background:!activeGeo?"rgba(124,58,237,0.12)":"rgba(255,255,255,0.02)",border:`1px solid ${!activeGeo?"rgba(124,58,237,0.25)":"rgba(255,255,255,0.06)"}`,color:!activeGeo?"#c4b5fd":"#6b7280",fontSize:12,fontWeight:600,fontFamily:"'DM Sans',sans-serif",transition:"all 0.3s"}}>All Markets</button>
{GEOS.map(geo=><button key={geo.id} onClick={()=>flyTo(geo)} style={{padding:"7px 16px",borderRadius:100,cursor:"pointer",background:activeGeo?.id===geo.id?"rgba(124,58,237,0.12)":"rgba(255,255,255,0.02)",border:`1px solid ${activeGeo?.id===geo.id?"rgba(124,58,237,0.25)":"rgba(255,255,255,0.06)"}`,color:activeGeo?.id===geo.id?"#c4b5fd":"#6b7280",fontSize:12,fontWeight:600,fontFamily:"'DM Sans',sans-serif",transition:"all 0.3s"}}>
<span style={{display:"inline-block",width:7,height:7,borderRadius:"50%",background:geo.color,marginRight:7,verticalAlign:"middle"}}/>{geo.name}</button>)}
</div>
{activeGeo&&<div style={{position:"absolute",top:16,right:16,width:240,background:"rgba(10,8,18,0.94)",border:"1px solid rgba(167,139,250,0.2)",borderRadius:14,padding:"20px 22px",backdropFilter:"blur(20px)",animation:"fadeInUp 0.35s ease"}}>
<div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
<div style={{width:12,height:12,borderRadius:"50%",background:activeGeo.color,boxShadow:`0 0 14px ${activeGeo.color}`}}/>
<span style={{color:"#f5f3ff",fontSize:17,fontWeight:700,fontFamily:"'Playfair Display',serif"}}>{activeGeo.name}</span></div>
{[["Region",activeGeo.region],["Population",activeGeo.pop],["Products",activeGeo.products.join(", ")],["Coordinates",`${activeGeo.lat}°, ${activeGeo.lng}°`]].map(([k,v])=>
<div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:9}}>
<span style={{color:"#6b7280",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>{k}</span>
<span style={{color:"#d1d5db",fontSize:12,fontWeight:500,fontFamily:k==="Coordinates"?"'JetBrains Mono',monospace":"'DM Sans',sans-serif"}}>{v}</span></div>)}
</div>}
</div>);
}

</div>;}
function TechBlock({symbol,title,desc}){const[h,setH]=useState(false);return<div onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)} style={{display:"flex",gap:14,padding:"16px 14px",borderRadius:12,transition:"background 0.3s",background:h?"rgba(124,58,237,0.04)":"transparent"}}><GlowIcon size={42}>{symbol}</GlowIcon><div><h4 style={{color:"#f5f3ff",fontSize:14.5,fontWeight:600,marginBottom:3,fontFamily:"'DM Sans',sans-serif"}}>{title}</h4><p style={{color:"#9ca3af",fontSize:12.5,lineHeight:1.65,margin:0,fontFamily:"'DM Sans',sans-serif"}}>{desc}</p></div></div>;}
function CountUp({target}){const[val,setVal]=useState("0");const ref=useRef(null);const started=useRef(false);useEffect(()=>{const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting&&!started.current){started.current=true;const n=parseInt(target);if(!isNaN(n)&&n<1000){let c=0;const s=Math.max(1,Math.floor(n/40));const iv=setInterval(()=>{c+=s;if(c>=n){c=n;clearInterval(iv);}setVal(c.toString());},30);}else setVal(target);}},{threshold:0.5});if(ref.current)obs.observe(ref.current);return()=>obs.disconnect();},[target]);return<span ref={ref}>{val}</span>;}

return(
